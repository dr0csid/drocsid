name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies and required X11 headers
        run: sudo apt-get update && sudo apt-get install -y pkg-config libx11-dev libxtst-dev libxext-dev libxkbfile-dev x11proto-dev x11proto-core-dev libxinerama-dev libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev xorg-dev libx11-xcb-dev

      - run: npm install

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_LIVEKIT_URL: ${{ secrets.VITE_LIVEKIT_URL }}
          VITE_LIVEKIT_TOKEN_ENDPOINT: ${{ secrets.VITE_LIVEKIT_TOKEN_ENDPOINT }}

      - run: npx electron-builder --linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: drocsid-linux
          path: dist-electron/*.AppImage